<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calseva Reports Data</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&family=Commissioner:wght@100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet">

  <!-- Material Symbols Outlined -->
  

  <style>
    @font-face {
      font-family: 'Material Symbols Outlined';
      font-style: normal;
      src: url('../material-symbols-outlined.woff2') format('woff2');
      font-display: block; /* Hides raw text fallback until icon font is loaded */
    }

    /* CSS Variables matching the Calseva "Mystic Forest" color palette */
    :root {
      --color-primary: #3A606E;       /* Dark slate / teal */
      --color-secondary: #607B7D;     /* Medium slate */
      --color-muted: #828E82;         /* Muted grey/green */
      --color-sage: #AAAE8E;          /* Sage accent */
      --color-bg-card: #E0E0E0;       /* Base grey background from palette */
      --color-bg-body: #1E2E35;       /* Premium dark ambient background */
      
      --card-bg-light: #7E9698;       /* Medium split-slate card background */
      
      --font-main: 'Elms Sans', 'Commissioner', 'Montserrat', 'SN Pro', sans-serif;
      --font-alt: 'Google Sans Flex', sans-serif;
    }

    /* Reset & Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, h1, p, .brand-text, .section-title, .step-title, .form-label, .empty-title {
      font-family: var(--font-main);
    }

    input, button, a, .nav-tab-label {
      font-family: var(--font-alt);
    }

    body {
      background-color: var(--color-bg-body);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* Ambient Desktop Background Styling */
    .app-wrapper {
      width: 100%;
      max-width: 430px;
      position: relative;
    }

    /* Device Mockup Shell */
    .device-container {
      background-color: var(--color-bg-card);
      width: 100%;
      height: 860px;
      max-height: 95vh;
      border-radius: 40px;
      border: 6px solid #C5CBC5;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      position: relative;
      overflow: hidden;
      animation: fadeInUp 0.8s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Header Section (Fixed at Top) */
    .reports-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 35px 32px 10px 32px;
      z-index: 10;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--color-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      border-radius: 50%;
      transition: background-color 0.2s ease;
    }

    .back-btn:hover {
      background-color: rgba(58, 96, 110, 0.1);
    }

    .back-btn .material-symbols-outlined {
      font-family: 'Material Symbols Outlined';

      font-size: 26px;
    }

    .header-title-container {
      display: flex;
      flex-direction: column;
    }

    .header-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--color-primary);
      letter-spacing: -0.5px;
    }

    .header-title-line {
      width: 110px;
      height: 2px;
      background-color: var(--color-primary);
      margin-top: 3px;
    }

    .action-icon-btn {
      background: none;
      border: none;
      color: var(--color-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
      border-radius: 50%;
      transition: all 0.2s ease;
    }

    .action-icon-btn:hover {
      background-color: rgba(58, 96, 110, 0.1);
      transform: scale(1.05);
    }

    .action-icon-btn .material-symbols-outlined {
      font-family: 'Material Symbols Outlined';

      font-size: 24px;
    }

    /* List Content Container */
    .reports-list-content {
      padding: 10px 32px 100px 32px; /* Leave room for FAB and tab bar */
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
      display: flex;
      flex-direction: column;
    }

    .reports-list-content::-webkit-scrollbar {
      display: none;
    }

    /* Search Bar Row */
    .search-row {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      margin-bottom: 25px;
    }

    .search-input-wrapper {
      flex: 1;
      position: relative;
    }

    .search-input-field {
      width: 100%;
      padding: 14px 22px;
      font-size: 13.5px;
      background-color: #FFFFFF;
      border: none;
      border-radius: 28px;
      color: var(--color-primary);
      outline: none;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
      font-weight: 500;
      transition: box-shadow 0.3s ease;
    }

    .search-input-field:focus {
      box-shadow: 0 6px 18px rgba(58, 96, 110, 0.12);
    }

    .search-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background-color: #FFFFFF;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-primary);
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
      transition: all 0.2s ease;
    }

    .search-btn:hover {
      transform: scale(1.05);
      background-color: #F8F9F8;
    }

    .search-btn .material-symbols-outlined {
      font-family: 'Material Symbols Outlined';

      font-size: 21px;
    }

    .action-symbol-btn {
      background: none;
      border: none;
      color: var(--color-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      transition: transform 0.2s ease;
    }

    .action-symbol-btn:hover {
      transform: scale(1.1);
    }

    .action-symbol-btn .material-symbols-outlined {
      font-family: 'Material Symbols Outlined';

      font-size: 26px;
    }

    /* Empty State */
    .empty-state-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-top: 80px;
      text-align: center;
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .empty-icon-box {
      font-size: 84px;
      color: var(--color-muted);
      margin-bottom: 20px;
      font-variation-settings: 'FILL' 0, 'wght' 300;
    }

    .empty-title {
      font-size: 16.5px;
      font-weight: 600;
      color: var(--color-secondary);
      line-height: 1.4;
    }

    /* Reports List Items */
    .report-cards-container {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
    }

    .report-card {
      background-color: var(--card-bg-light);
      border-radius: 20px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      box-shadow: 0 4px 12px rgba(96, 123, 125, 0.12);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      animation: slideIn 0.35s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .report-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(96, 123, 125, 0.22);
    }

    .report-card-left {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1;
    }

    /* White rounded vertical pill icon */
    .report-pill-icon {
      width: 13px;
      height: 28px;
      border-radius: 6px;
      background-color: #FFFFFF;
      display: inline-block;
      flex-shrink: 0;
    }

    .report-info {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .report-title {
      color: #FFFFFF;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.3;
    }

    .report-meta {
      color: rgba(255, 255, 255, 0.7);
      font-size: 11px;
      font-weight: 500;
    }

    /* Right Action icons on card */
    .report-card-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-action-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background-color: #E2E6E2;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-primary);
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    }

    .card-action-btn:hover {
      background-color: #FFFFFF;
      transform: scale(1.08);
      color: var(--color-primary);
    }

    .card-action-btn .material-symbols-outlined {
      font-family: 'Material Symbols Outlined';

      font-size: 17px;
    }

    /* Floating Action Button (FAB) */
    .fab-btn {
      position: absolute;
      bottom: 100px; /* Floats above bottom navigation */
      right: 32px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background-color: var(--color-primary);
      border: none;
      color: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(58, 96, 110, 0.35);
      z-index: 90;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .fab-btn:hover {
      transform: scale(1.08) rotate(90deg);
      background-color: #2D4C57;
      box-shadow: 0 10px 28px rgba(58, 96, 110, 0.45);
    }

    .fab-btn .material-symbols-outlined {
      font-family: 'Material Symbols Outlined';

      font-size: 26px;
    }

    /* Sticky Bottom Navigation Bar */
    .bottom-nav-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background-color: #E2E6E2;
      border-top: 1.5px solid #D2D8D2;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 6px 12px 14px 12px;
      z-index: 100;
      border-bottom-left-radius: 34px;
      border-bottom-right-radius: 34px;
    }

    .nav-tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--color-muted);
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 62px;
      gap: 3px;
    }

    .nav-tab:hover {
      color: var(--color-primary);
    }

    .nav-tab.active {
      color: var(--color-primary);
    }

    .nav-tab-icon {
      font-size: 24px;
      font-variation-settings: 'FILL' 0, 'wght' 400;
    }

    .nav-tab.active .nav-tab-icon {
      font-variation-settings: 'FILL' 1, 'wght' 500;
    }

    .nav-tab-label {
      font-size: 10.5px;
      font-weight: 600;
    }

    /* Mobile overrides */
    @media (max-width: 480px) {
      body {
        padding: 0;
        background-color: var(--color-bg-card);
      }
      .app-wrapper {
        max-width: 100%;
        height: 100vh;
      }
      .device-container {
        border-radius: 0;
        border: none;
        box-shadow: none;
        height: 100vh;
        max-height: 100vh;
      }
      .reports-header {
        padding-top: 50px;
      }
      .bottom-nav-bar {
        border-bottom-left-radius: 0;
        border-bottom-right-radius: 0;
        padding-bottom: 24px;
        height: 90px;
      }
    }
  
    /* Premium Video Loader Overlay */
    .loader-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: var(--color-bg-card, #E0E0E0);
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.9; /* Decreased opacity for perfect redirection outline visual */
      transition: opacity 0.4s ease;
      pointer-events: auto;
    }

    .loader-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 34px;
    }

    @media (max-width: 480px) {
      .loader-video {
        border-radius: 0;
      }
    }

  </style>
</head>
<body>

  <main class="app-wrapper">
    <div class="device-container" id="deviceContainer">
      <!-- Video Loader Overlay -->
      <div class="loader-overlay" id="loaderOverlay">
        <video class="loader-video" id="loaderVideo" autoplay loop muted playsinline>
          <source src="../_cal-loder.mp4" type="video/mp4">
        </video>
      </div>


      <!-- Header -->
      <header class="reports-header">
        <div class="header-left">
          <button class="back-btn" onclick="handleBackAction()" aria-label="Go back">
            <span class="material-symbols-outlined">arrow_back</span>
          </button>
          <div class="header-title-container">
            <h1 class="header-title">Reports data</h1>
            <span class="header-title-line"></span>
          </div>
        </div>
        <button class="action-icon-btn" onclick="resetReportsList()" aria-label="Reset list">
          <span class="material-symbols-outlined">refresh</span>
        </button>
      </header>

      <!-- Main Reports Listing Section -->
      <div class="reports-list-content">
        
        <!-- Search Row -->
        <div class="search-row">
          <div class="search-input-wrapper">
            <input type="text" id="searchInput" class="search-input-field" placeholder="Search reports..." oninput="handleSearchFilter()">
          </div>
          <button type="button" class="search-btn" onclick="handleSearchFilter()" aria-label="Search">
            <span class="material-symbols-outlined">search</span>
          </button>
          
          <button type="button" class="action-symbol-btn" onclick="toggleSort()" aria-label="Sort reports">
            <span class="material-symbols-outlined" id="sortIcon">sort</span>
          </button>

          <button type="button" class="action-symbol-btn" onclick="printReportList()" aria-label="Print list">
            <span class="material-symbols-outlined">print</span>
          </button>
        </div>

        <!-- Empty State -->
        <div class="empty-state-wrapper" id="emptyState" style="display: none;">
          <span class="material-symbols-outlined empty-icon-box">inventory_2</span>
          <h2 class="empty-title">No Reports<br>added yet</h2>
        </div>

        <!-- Cards Listing container -->
        <div class="report-cards-container" id="reportCardsContainer">
          <!-- Dynamically populated reports list cards -->
        </div>

      </div>

      <!-- FAB button redirecting to wizard creation form -->
      <button type="button" class="fab-btn" onclick="navigateToPage('../cali-report/cali-report.html');" aria-label="Create report">
        <span class="material-symbols-outlined">add</span>
      </button>

      <!-- Sticky Bottom Navigation Bar (For List View) -->
      <nav class="bottom-nav-bar">
        <a class="nav-tab" onclick="navigateTab('Home')">
          <span class="material-symbols-outlined nav-tab-icon">home</span>
          <span class="nav-tab-label">Home</span>
        </a>
        <a class="nav-tab active" onclick="navigateTab('Reports')">
          <span class="material-symbols-outlined nav-tab-icon">assignment</span>
          <span class="nav-tab-label">Reports</span>
        </a>
        <a class="nav-tab" onclick="navigateTab('Tutorial')">
          <span class="material-symbols-outlined nav-tab-icon">play_circle</span>
          <span class="nav-tab-label">Tutorial</span>
        </a>
        <a class="nav-tab" onclick="navigateTab('Schedule')">
          <span class="material-symbols-outlined nav-tab-icon">schedule</span>
          <span class="nav-tab-label">Schedule</span>
        </a>
        <a class="nav-tab" onclick="navigateTab('Profile')">
          <span class="material-symbols-outlined nav-tab-icon">person</span>
          <span class="nav-tab-label">Profile</span>
        </a>
      </nav>

    </div>
  </main>

  <script>
    // Initial default mock reports
    const defaultReports = [
      {
        id: 1,
        cert: "CALS/2026/001",
        desc: "Pressure Gauge",
        date: new Date().toISOString().split('T')[0],
        payload: JSON.stringify({
          certNumber: "CALS/2026/001",
          inwardNumber: "INW/2026/102",
          useCurrentDate: true,
          dateCalibration: new Date().toISOString().split('T')[0],
          dateReceipt: new Date().toISOString().split('T')[0],
          noDueDate: false,
          dateDue: new Date(Date.now() + 365*24*60*60*1000).toISOString().split('T')[0],
          customDescCheckbox: false,
          descriptionSelect: "Pressure Gauge",
          makeModel: "Wika 213.53",
          instrumentId: "PG-01",
          serialNumber: "W213-9824",
          obsCount: 2,
          observations: [
            { uuc: 10, obs1: 10.1, obs2: 10.1, mean: 10.1, error: 0.1 },
            { uuc: 20, obs1: 20.2, obs2: 20.0, mean: 20.1, error: 0.1 }
          ],
          masterCount: 1,
          mastersData: [
            { name: "Fluke 2700G Master Gauge", id: "MST-PG-09", make: "Fluke Calibration", validity: "2027-02-15" }
          ]
        })
      },
      {
        id: 2,
        cert: "CALS/2026/002",
        desc: "Pressure Gauge",
        date: new Date().toISOString().split('T')[0],
        payload: JSON.stringify({
          certNumber: "CALS/2026/002",
          inwardNumber: "INW/2026/103",
          useCurrentDate: true,
          dateCalibration: new Date().toISOString().split('T')[0],
          dateReceipt: new Date().toISOString().split('T')[0],
          noDueDate: false,
          dateDue: new Date(Date.now() + 365*24*60*60*1000).toISOString().split('T')[0],
          customDescCheckbox: false,
          descriptionSelect: "Pressure Gauge",
          makeModel: "Ashcroft Type 1009",
          instrumentId: "PG-02",
          serialNumber: "ASH-5521",
          obsCount: 2,
          observations: [
            { uuc: 5, obs1: 4.9, obs2: 5.0, mean: 4.95, error: -0.05 },
            { uuc: 10, obs1: 10.0, obs2: 10.1, mean: 10.05, error: 0.05 }
          ],
          masterCount: 1,
          mastersData: [
            { name: "Fluke 2700G Master Gauge", id: "MST-PG-09", make: "Fluke Calibration", validity: "2027-02-15" }
          ]
        })
      },
      {
        id: 3,
        cert: "CALS/2026/003",
        desc: "Pressure Gauge",
        date: new Date(Date.now() - 24*60*60*1000).toISOString().split('T')[0],
        payload: JSON.stringify({
          certNumber: "CALS/2026/003",
          inwardNumber: "INW/2026/101",
          useCurrentDate: false,
          dateCalibration: new Date(Date.now() - 24*60*60*1000).toISOString().split('T')[0],
          dateReceipt: new Date(Date.now() - 48*60*60*1000).toISOString().split('T')[0],
          noDueDate: false,
          dateDue: new Date(Date.now() + 364*24*60*60*1000).toISOString().split('T')[0],
          customDescCheckbox: false,
          descriptionSelect: "Pressure Gauge",
          makeModel: "Marshal PG-40",
          instrumentId: "PG-03",
          serialNumber: "MAR-7731",
          obsCount: 2,
          observations: [
            { uuc: 50, obs1: 49.8, obs2: 50.1, mean: 49.95, error: -0.05 },
            { uuc: 100, obs1: 100.1, obs2: 100.3, mean: 100.2, error: 0.2 }
          ],
          masterCount: 1,
          mastersData: [
            { name: "Ametek Hydraulic Tester", id: "MST-HY-02", make: "Ametek", validity: "2027-05-10" }
          ]
        })
      }
    ];

    let reportsList = [];
    let isSortDescending = true;

    window.addEventListener('DOMContentLoaded', () => {
      // Load saved reports from localstorage, or initialize with defaults
      const saved = localStorage.getItem('calseva_reports');
      if (saved) {
        reportsList = JSON.parse(saved);
      } else {
        reportsList = [...defaultReports];
        localStorage.setItem('calseva_reports', JSON.stringify(reportsList));
      }
      renderReports();
    });

    // Handle Header Back Button Click
    function handleBackAction() {
      navigateToPage('../caliprofile/caliprofile.html');
    }

    // Tab Navigation Linkage
    function navigateTab(tabName) {
      if (tabName === 'Home') {
        navigateToPage('../home/home.html');
      } else if (tabName === 'Profile') {
        navigateToPage('../caliprofile/caliprofile.html');
      } else if (tabName === 'Schedule') {
        navigateToPage('../schedule-work/schedule-work.html');
      } else if (tabName === 'Tutorial') {
        navigateToPage('../tutorial/tutorial.html');
      }
    }

    // Render reports cards to listing container
    function renderReports(filterQuery = '') {
      const container = document.getElementById('reportCardsContainer');
      const emptyState = document.getElementById('emptyState');
      
      container.innerHTML = '';

      let filtered = reportsList.filter(item => 
        item.desc.toLowerCase().includes(filterQuery.toLowerCase()) || 
        item.cert.toLowerCase().includes(filterQuery.toLowerCase())
      );

      // Sort by ID (timestamp)
      filtered.sort((a, b) => {
        return isSortDescending ? b.id - a.id : a.id - b.id;
      });

      if (filtered.length === 0) {
        emptyState.style.display = 'flex';
        container.style.display = 'none';
        return;
      }

      emptyState.style.display = 'none';
      container.style.display = 'flex';

      filtered.forEach(report => {
        const cardHTML = `
          <div class="report-card" id="card-${report.id}">
            <div class="report-card-left">
              <span class="report-pill-icon"></span>
              <div class="report-info">
                <span class="report-title">${report.desc}</span>
                <span class="report-meta">${report.cert} | ${report.date}</span>
              </div>
            </div>
            <div class="report-card-right">
              <button class="card-action-btn" onclick="deleteReport(${report.id})" aria-label="Delete report">
                <span class="material-symbols-outlined">delete</span>
              </button>
              <button class="card-action-btn" onclick="editReport(${report.id})" aria-label="Edit report">
                <span class="material-symbols-outlined">edit</span>
              </button>
            </div>
          </div>
        `;
        container.insertAdjacentHTML('beforeend', cardHTML);
      });
    }

    // Search bar trigger
    function handleSearchFilter() {
      const query = document.getElementById('searchInput').value;
      renderReports(query);
    }

    // Sort order toggling
    function toggleSort() {
      isSortDescending = !isSortDescending;
      const sortIcon = document.getElementById('sortIcon');
      sortIcon.textContent = isSortDescending ? 'sort' : 'filter_list';
      handleSearchFilter();
    }

    // Edit report callback
    function editReport(reportId) {
      const report = reportsList.find(r => r.id === reportId);
      if (report && report.payload) {
        // Save payload as current report draft so wizard loads it
        localStorage.setItem('calseva_report_draft', report.payload);
        window.location.href = `../cali-report/cali-report.html?editId=${reportId}`;
      } else {
        alert("Unable to open report details.");
      }
    }

    // Delete report callback
    function deleteReport(reportId) {
      if (confirm("Are you sure you want to delete this report?")) {
        reportsList = reportsList.filter(r => r.id !== reportId);
        localStorage.setItem('calseva_reports', JSON.stringify(reportsList));
        
        // Remove item with clean animation
        const card = document.getElementById(`card-${reportId}`);
        if (card) {
          card.style.opacity = '0';
          card.style.transform = 'scale(0.9)';
          setTimeout(() => {
            handleSearchFilter();
          }, 300);
        } else {
          handleSearchFilter();
        }
      }
    }

    // Reset list handler
    function resetReportsList() {
      if (confirm("Reset to default reports data?")) {
        localStorage.removeItem('calseva_reports');
        reportsList = [...defaultReports];
        localStorage.setItem('calseva_reports', JSON.stringify(reportsList));
        document.getElementById('searchInput').value = '';
        renderReports();
      }
    }

    // Print reports list
    function printReportList() {
      if (confirm("Proceed to print the reports log?")) {
        window.print();
      }
    }
  
    // Page load fade-out transition
    window.addEventListener('DOMContentLoaded', () => {
      const loader = document.getElementById('loaderOverlay');
      if (loader) {
        setTimeout(() => {
          loader.style.opacity = '0';
          setTimeout(() => {
            loader.style.display = 'none';
          }, 400);
        }, 50); // Fade out immediately on load to eliminate the double loader feeling
      }
    });

    // Redirection loader trigger
    function navigateToPage(url) {
      const loader = document.getElementById('loaderOverlay');
      if (loader) {
        loader.style.display = 'flex';
        // force reflow
        loader.offsetHeight;
        loader.style.opacity = '0.9'; // Decreased opacity to match design preference
        const video = document.getElementById('loaderVideo');
        if (video) {
          video.currentTime = 0;
          video.play().catch(() => {});
        }
        setTimeout(() => {
          window.location.href = url;
        }, 1100); // Play video for 1.1s before redirect
      } else {
        window.location.href = url;
      }
    }

  </script>
</body>
</html>
