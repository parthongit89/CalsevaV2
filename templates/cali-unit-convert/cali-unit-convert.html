<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calseva Unit Converter</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&family=Commissioner:wght@100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet">

  <style>
    @font-face {
      font-family: 'Material Symbols Outlined';
      font-style: normal;
      src: url('../material-symbols-outlined.woff2') format('woff2');
      font-display: block; /* Hides raw text fallback until icon font is loaded */
    }

    .material-symbols-outlined {
      font-family: 'Material Symbols Outlined' !important;
      font-style: normal;
      font-weight: normal;
      display: inline-block;
      vertical-align: middle;
      line-height: 1;
      text-transform: none;
      letter-spacing: normal;
      word-wrap: normal;
      white-space: nowrap;
      direction: ltr;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      -moz-osx-font-smoothing: grayscale;
    }



    .material-symbols-outlined {
      font-family: 'Material Symbols Outlined' !important;
      font-style: normal;
      font-weight: normal;
      display: inline-block;
      vertical-align: middle;
      line-height: 1;
      text-transform: none;
      letter-spacing: normal;
      word-wrap: normal;
      white-space: nowrap;
      direction: ltr;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      -moz-osx-font-smoothing: grayscale;
    }

    /* CSS Variables matching design palette */
    :root {
      --color-primary: #3A606E;       /* Dark slate / teal */
      --color-secondary: #607B7D;     /* Medium slate */
      --color-muted: #828E82;         /* Muted grey/green */
      --color-sage: #AAAE8E;          /* Sage accent */
      --color-bg-card: #E0E0E0;       /* Base grey background from palette */
      --color-bg-body: #1E2E35;       /* Premium dark ambient background */
      
      --font-main: 'Elms Sans', 'Commissioner', 'Montserrat', 'SN Pro', sans-serif;
      --font-alt: 'Google Sans Flex', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, h1, h2, h3, p, .brand-text, .section-title {
      font-family: var(--font-main);
    }

    button, a, select {
      font-family: var(--font-alt);
    }

    body {
      background-color: var(--color-bg-body);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
    }

    .app-wrapper {
      width: 100%;
      max-width: 430px;
      position: relative;
    }

    .device-container {
      background-color: var(--color-bg-card);
      width: 100%;
      height: 860px;
      max-height: 95vh;
      border-radius: 40px;
      border: 6px solid #C5CBC5;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      position: relative;
      overflow: hidden;
      animation: fadeInUp 0.8s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Header Section styling */
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 25px 25px 15px 25px;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .back-btn, .logout-btn {
      background: none;
      border: none;
      color: var(--color-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: #E2E6E2;
      transition: all 0.2s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .back-btn:hover, .logout-btn:hover {
      background-color: #D4DAD4;
      transform: scale(1.05);
    }

    .header-title-container {
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .header-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--color-primary);
    }

    .header-title-underline {
      text-decoration: underline;
      text-decoration-color: var(--color-primary);
      text-underline-offset: 4px;
    }

    /* Converter Main White Card Container */
    .converter-card {
      flex: 1;
      background-color: #FFFFFF;
      margin: 10px 20px 20px 20px;
      border-radius: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    /* Category Pill Selectors */
    .category-tabs {
      display: flex;
      background-color: #F0F2F0;
      border-radius: 25px;
      padding: 4px;
      margin-bottom: 20px;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .category-tab {
      flex: 1;
      text-align: center;
      padding: 10px 0;
      font-size: 12px;
      font-weight: bold;
      color: #555555;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .category-tab.active {
      background-color: var(--color-primary);
      color: #FFFFFF;
    }

    /* Display Panels grey card background */
    .conversion-panel {
      background-color: #E2E5E2;
      border-radius: 20px;
      padding: 15px;
      margin-bottom: 20px;
      flex-shrink: 0;
    }

    .panel-row {
      display: flex;
      flex-direction: column;
      margin-bottom: 12px;
    }

    .panel-row:last-child {
      margin-bottom: 0;
    }

    .select-dropdown-container {
      display: flex;
      align-items: center;
      margin-left: 5px;
      margin-bottom: 6px;
    }

    .unit-select {
      background: transparent;
      border: none;
      font-size: 14px;
      font-weight: 700;
      color: var(--color-primary);
      cursor: pointer;
      outline: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      padding-right: 20px;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%2712%27%20height%3D%2712%27%20viewBox%3D%270%200%2024%2024%27%20fill%3D%27none%27%20stroke%3D%27%233A606E%27%20stroke-width%3D%273%27%20stroke-linecap%3D%27round%27%20stroke-linejoin%3D%27round%27%3E%3Cpolyline%20points%3D%276%209%2012%2015%2018%209%27%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E");
      background-repeat: no-repeat;
      background-position: right center;
    }

    .value-display-box {
      background-color: #F7F9F7;
      border-radius: 16px;
      padding: 12px 18px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      position: relative;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s ease;
      min-height: 70px;
      justify-content: center;
    }

    .value-display-box.active {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(58, 96, 110, 0.15);
    }

    .display-value-text {
      font-size: 26px;
      font-weight: 600;
      color: #1E2E35;
      word-break: break-all;
      text-align: right;
      line-height: 1.1;
      width: 100%;
    }

    .display-unit-suffix {
      font-size: 11px;
      font-weight: bold;
      color: #888888;
      margin-top: 4px;
      align-self: flex-end;
    }

    /* Keypad Grid styling */
    .keypad-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      justify-items: center;
      align-items: center;
      margin-top: auto;
      padding-top: 15px;
      flex-shrink: 0;
    }

    .key-btn {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: none;
      background-color: #32525F;
      color: #FFFFFF;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      user-select: none;
    }

    .key-btn:active {
      transform: scale(0.92);
      background-color: #243D47;
    }

    .key-btn.btn-clear {
      color: #D68A1A; /* Accent yellow-orange */
    }

    .key-btn.btn-action {
      background-color: #32525F;
    }

    /* Calseva Watermark Footer */
    .watermark-footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 15px 0;
      opacity: 0.8;
      flex-shrink: 0;
    }

    .watermark-title {
      font-size: 11px;
      font-weight: bold;
      color: #828E82;
      margin-top: 8px;
      letter-spacing: 0.5px;
    }

    .watermark-copyright {
      font-size: 9px;
      color: #9EA69E;
      margin-top: 4px;
    }

    /* Mobile viewports override styling */
    @media (max-width: 480px) {
      body {
        padding: 0;
        background-color: var(--color-bg-card);
      }
      .app-wrapper {
        max-width: 100%;
        height: 100vh;
      }
      .device-container {
        border-radius: 0;
        border: none;
        box-shadow: none;
        height: 100vh;
        max-height: 100vh;
        padding-top: 10px;
      }
      .header-bar {
        padding-top: 40px;
      }
    }

    /* Premium Redirect Video Loader Overlay */
    .loader-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: var(--color-bg-card);
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.9;
      transition: opacity 0.4s ease;
      pointer-events: auto;
    }

    .loader-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 34px;
    }

    @media (max-width: 480px) {
      .loader-video {
        border-radius: 0;
      }
    }
  </style>
</head>
<body>

  <main class="app-wrapper">
    <div class="device-container" id="deviceContainer">
      
      <!-- Video Loader Overlay -->
      <div class="loader-overlay" id="loaderOverlay">
        <video class="loader-video" id="loaderVideo" autoplay loop muted playsinline>
          <source src="../_cal-loder.mp4" type="video/mp4">
        </video>
      </div>

      <!-- Header Bar -->
      <header class="header-bar">
        <div class="header-left">
          <button class="back-btn" onclick="handleBackAction()" aria-label="Go back">
            <span class="material-symbols-outlined">arrow_back</span>
          </button>
          <div class="header-title-container">
            <h1 class="header-title"><span class="header-title-underline">CalSEVA</span> Unit Conveter</h1>
          </div>
        </div>
        <button class="logout-btn" onclick="handleLogout()" aria-label="Logout">
          <span class="material-symbols-outlined">logout</span>
        </button>
      </header>

      <!-- Calculator Card -->
      <div class="converter-card">
        
        <!-- Category Tab Selector -->
        <div class="category-tabs" role="tablist">
          <div class="category-tab active" id="tab-Temperature" onclick="switchCategory('Temperature')" role="tab">Temperature</div>
          <div class="category-tab" id="tab-Volume" onclick="switchCategory('Volume')" role="tab">Volume</div>
          <div class="category-tab" id="tab-Pressure" onclick="switchCategory('Pressure')" role="tab">Pressure</div>
        </div>

        <!-- Conversion Display Panels -->
        <div class="conversion-panel">
          
          <!-- Top Display Slot -->
          <div class="panel-row">
            <div class="select-dropdown-container">
              <select id="topUnitSelect" class="unit-select" onchange="onUnitChange()"></select>
            </div>
            <div class="value-display-box active" id="topSlot" onclick="setActiveSlot('top')">
              <div class="display-value-text" id="topValueDisplay">1</div>
              <div class="display-unit-suffix" id="topUnitSuffix">°F</div>
            </div>
          </div>

          <!-- Bottom Display Slot -->
          <div class="panel-row">
            <div class="select-dropdown-container">
              <select id="bottomUnitSelect" class="unit-select" onchange="onUnitChange()"></select>
            </div>
            <div class="value-display-box" id="bottomSlot" onclick="setActiveSlot('bottom')">
              <div class="display-value-text" id="bottomValueDisplay">-17.2222222222</div>
              <div class="display-unit-suffix" id="bottomUnitSuffix">°C</div>
            </div>
          </div>

        </div>

        <!-- Numeric Virtual Keypad -->
        <div class="keypad-grid">
          <button class="key-btn" onclick="handleKeyPress('7')">7</button>
          <button class="key-btn" onclick="handleKeyPress('8')">8</button>
          <button class="key-btn" onclick="handleKeyPress('9')">9</button>
          <button class="key-btn btn-action" onclick="handleKeyPress('backspace')" aria-label="Delete">
            <span class="material-symbols-outlined" style="font-size: 24px;">backspace</span>
          </button>

          <button class="key-btn" onclick="handleKeyPress('4')">4</button>
          <button class="key-btn" onclick="handleKeyPress('5')">5</button>
          <button class="key-btn" onclick="handleKeyPress('6')">6</button>
          <button class="key-btn btn-clear" onclick="handleKeyPress('clear')">C</button>

          <button class="key-btn" onclick="handleKeyPress('1')">1</button>
          <button class="key-btn" onclick="handleKeyPress('2')">2</button>
          <button class="key-btn" onclick="handleKeyPress('3')">3</button>
          <button class="key-btn btn-action" onclick="handleKeyPress('up')" aria-label="Move Up">
            <span class="material-symbols-outlined" style="font-size: 26px;">arrow_upward</span>
          </button>

          <button class="key-btn" onclick="handleKeyPress('+/-')">+/-</button>
          <button class="key-btn" onclick="handleKeyPress('0')">0</button>
          <button class="key-btn" onclick="handleKeyPress('.')">.</button>
          <button class="key-btn btn-action" onclick="handleKeyPress('down')" aria-label="Move Down">
            <span class="material-symbols-outlined" style="font-size: 26px;">arrow_downward</span>
          </button>
        </div>

      </div>

      <!-- Watermark Logo Footer -->
      <footer class="watermark-footer">
        <svg width="60" height="60" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="opacity: 0.16;">
          <circle cx="50" cy="50" r="45" stroke="#3A606E" stroke-width="3" />
          <circle cx="50" cy="50" r="38" stroke="#3A606E" stroke-width="1.5" stroke-dasharray="4 2" />
          <path d="M50 25 C40 25 35 30 35 37 C35 45 42 47 50 49 C58 51 65 53 65 62 C65 71 58 75 50 75 C40 75 35 70 35 63" stroke="#3A606E" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span class="watermark-title">Calseva Private Solutions</span>
        <span class="watermark-copyright">© 2025 All Rights Reserved</span>
      </footer>

    </div>
  </main>

  <script>
    // State management variables
    let currentCategory = 'Temperature';
    let activeSlot = 'top'; // 'top' or 'bottom'
    let topValueString = '1';
    let bottomValueString = '';

    // Unit options data
    const categoryUnits = {
      Temperature: [
        { name: 'Fahrenheit', suffix: '°F' },
        { name: 'Celsius', suffix: '°C' },
        { name: 'Kelvin', suffix: 'K' }
      ],
      Volume: [
        { name: 'Liters', suffix: 'L' },
        { name: 'Milliliters', suffix: 'mL' },
        { name: 'Gallons', suffix: 'gal' },
        { name: 'Cubic Meters', suffix: 'm³' }
      ],
      Pressure: [
        { name: 'Bar', suffix: 'bar' },
        { name: 'PSI', suffix: 'psi' },
        { name: 'Pascal', suffix: 'Pa' },
        { name: 'Kilopascal', suffix: 'kPa' },
        { name: 'Atmosphere', suffix: 'atm' }
      ]
    };

    window.addEventListener('DOMContentLoaded', () => {
      // Dark Mode theme check
      const isDarkMode = localStorage.getItem('calseva_dark_mode') === 'true';
      applyDarkTheme(isDarkMode);

      // Initialize default category selects
      switchCategory('Temperature');
    });

    function applyDarkTheme(enable) {
      const container = document.getElementById('deviceContainer');
      if (container) {
        if (enable) {
          container.classList.add('dark-theme');
        } else {
          container.classList.remove('dark-theme');
        }
      }
    }

    function handleBackAction() {
      navigateToPage('../home/home.html');
    }

    // Handles safe back keypress for physical android devices
    window.addEventListener('popstate', () => {
      navigateToPage('../home/home.html');
    });

    function handleLogout() {
      if (confirm("Are you sure you want to log out?")) {
        navigateToPage('/cal-login/cal-logout');
      }
    }

    // Toggle selected input panels
    function setActiveSlot(slot) {
      activeSlot = slot;
      const topSlot = document.getElementById('topSlot');
      const bottomSlot = document.getElementById('bottomSlot');

      if (slot === 'top') {
        topSlot.classList.add('active');
        bottomSlot.classList.remove('active');
      } else {
        bottomSlot.classList.add('active');
        topSlot.classList.remove('active');
      }
    }

    // Category changes
    function switchCategory(category) {
      currentCategory = category;

      // Update tabs display
      document.querySelectorAll('.category-tab').forEach(tab => {
        tab.classList.remove('active');
      });
      document.getElementById(`tab-${category}`).classList.add('active');

      // Populate Select elements
      const topSelect = document.getElementById('topUnitSelect');
      const bottomSelect = document.getElementById('bottomUnitSelect');
      topSelect.innerHTML = '';
      bottomSelect.innerHTML = '';

      categoryUnits[category].forEach((unit, idx) => {
        const opt1 = document.createElement('option');
        opt1.value = unit.name;
        opt1.textContent = unit.name;
        topSelect.appendChild(opt1);

        const opt2 = document.createElement('option');
        opt2.value = unit.name;
        opt2.textContent = unit.name;
        bottomSelect.appendChild(opt2);
      });

      // Default dropdown selection
      topSelect.selectedIndex = 0;
      bottomSelect.selectedIndex = 1;

      // Initial defaults value
      topValueString = '1';
      bottomValueString = '';
      activeSlot = 'top';
      
      setActiveSlot('top');
      updateDisplays();
    }

    // Handle updates when dropdown units are changed
    function onUnitChange() {
      updateDisplays();
    }

    // Renders and calculates conversions in real-time
    function updateDisplays() {
      const topSelect = document.getElementById('topUnitSelect');
      const bottomSelect = document.getElementById('bottomUnitSelect');

      if (!topSelect || !bottomSelect) return;

      const topUnit = topSelect.value;
      const bottomUnit = bottomSelect.value;

      // Suffix labels
      const topUnitData = categoryUnits[currentCategory].find(u => u.name === topUnit);
      const bottomUnitData = categoryUnits[currentCategory].find(u => u.name === bottomUnit);

      document.getElementById('topUnitSuffix').textContent = topUnitData ? topUnitData.suffix : '';
      document.getElementById('bottomUnitSuffix').textContent = bottomUnitData ? bottomUnitData.suffix : '';

      // Calculation logic
      if (activeSlot === 'top') {
        const topVal = parseFloat(topValueString);
        if (isNaN(topVal)) {
          bottomValueString = '0';
        } else {
          bottomValueString = formatOutputValue(performConversion(topVal, topUnit, bottomUnit));
        }
      } else {
        const bottomVal = parseFloat(bottomValueString);
        if (isNaN(bottomVal)) {
          topValueString = '0';
        } else {
          topValueString = formatOutputValue(performConversion(bottomVal, bottomUnit, topUnit));
        }
      }

      // Update values in display fields
      document.getElementById('topValueDisplay').textContent = topValueString;
      document.getElementById('bottomValueDisplay').textContent = bottomValueString;
      
      // Auto-shrink text if values get too large to prevent overflow
      adjustTextSize('topValueDisplay');
      adjustTextSize('bottomValueDisplay');
    }

    // Shrinks font scale dynamically for long digits
    function adjustTextSize(elementId) {
      const el = document.getElementById(elementId);
      if (!el) return;
      const length = el.textContent.length;
      if (length > 18) {
        el.style.fontSize = '14px';
      } else if (length > 12) {
        el.style.fontSize = '18px';
      } else if (length > 8) {
        el.style.fontSize = '22px';
      } else {
        el.style.fontSize = '26px';
      }
    }

    // Format output to standard precision and strip trailing decimals
    function formatOutputValue(val) {
      if (isNaN(val)) return '0';
      if (!isFinite(val)) return 'Error';
      // Restrict up to 10 decimal precision
      let result = Number(val.toFixed(10)).toString();
      return result;
    }

    // Conversion formulas
    function performConversion(val, from, to) {
      if (from === to) return val;

      if (currentCategory === 'Temperature') {
        // Convert to base Celsius
        let cVal = 0;
        if (from === 'Celsius') cVal = val;
        else if (from === 'Fahrenheit') cVal = (val - 32) * 5 / 9;
        else if (from === 'Kelvin') cVal = val - 273.15;

        // Convert Celsius to destination
        if (to === 'Celsius') return cVal;
        else if (to === 'Fahrenheit') return cVal * 9 / 5 + 32;
        else if (to === 'Kelvin') return cVal + 273.15;
      } 
      
      else if (currentCategory === 'Volume') {
        // Base Liters (L) factors
        const factors = {
          Liters: 1.0,
          Milliliters: 0.001,
          Gallons: 3.78541,
          'Cubic Meters': 1000.0
        };
        const litersVal = val * factors[from];
        return litersVal / factors[to];
      } 
      
      else if (currentCategory === 'Pressure') {
        // Base Bar factors
        const factors = {
          Bar: 1.0,
          PSI: 0.0689476,
          Pascal: 0.00001,
          Kilopascal: 0.01,
          Atmosphere: 1.01325
        };
        const barVal = val * factors[from];
        return barVal / factors[to];
      }

      return val;
    }

    // Circular Keypad input logic
    function handleKeyPress(key) {
      let activeStr = activeSlot === 'top' ? topValueString : bottomValueString;

      if (key >= '0' && key <= '9') {
        if (activeStr === '0' || activeStr === '-0') {
          activeStr = activeStr.startsWith('-') ? '-' + key : key;
        } else {
          // Cap maximum digit entry to prevent overflow
          if (activeStr.replace(/[^0-9]/g, '').length < 15) {
            activeStr += key;
          }
        }
      } else if (key === '.') {
        if (!activeStr.includes('.')) {
          activeStr += '.';
        }
      } else if (key === '+/-') {
        if (activeStr.startsWith('-')) {
          activeStr = activeStr.substring(1);
        } else {
          if (activeStr !== '0') {
            activeStr = '-' + activeStr;
          }
        }
      } else if (key === 'backspace') {
        activeStr = activeStr.slice(0, -1);
        if (activeStr === '' || activeStr === '-') {
          activeStr = '0';
        }
      } else if (key === 'clear') {
        topValueString = '0';
        bottomValueString = '0';
        updateDisplays();
        return;
      } else if (key === 'up') {
        setActiveSlot('top');
        return;
      } else if (key === 'down') {
        setActiveSlot('bottom');
        return;
      }

      if (activeSlot === 'top') {
        topValueString = activeStr;
      } else {
        bottomValueString = activeStr;
      }

      updateDisplays();
    }

    // Page load fade-out transition
    window.addEventListener('DOMContentLoaded', () => {
      const loader = document.getElementById('loaderOverlay');
      if (loader) {
        setTimeout(() => {
          loader.style.opacity = '0';
          setTimeout(() => {
            loader.style.display = 'none';
          }, 400);
        }, 50);
      }
    });

    // Redirection loader trigger
    function navigateToPage(url) {
      const loader = document.getElementById('loaderOverlay');
      if (loader) {
        loader.style.display = 'flex';
        loader.offsetHeight; // reflow
        loader.style.opacity = '0.9';
        const video = document.getElementById('loaderVideo');
        if (video) {
          video.currentTime = 0;
          video.play().catch(() => {});
        }
        setTimeout(() => {
          window.location.href = url;
        }, 1100);
      } else {
        window.location.href = url;
      }
    }
  </script>
</body>
</html>
