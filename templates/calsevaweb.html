<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/theme-loader.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Not Found</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&family=Commissioner:wght@100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet">

  <style>
    @font-face {
      font-family: 'Material Symbols Outlined';
      font-style: normal;
      src: url('/material-symbols-outlined.woff2') format('woff2');
      font-display: block;
    }

    .material-symbols-outlined {
      font-family: 'Material Symbols Outlined' !important;
      font-style: normal;
      font-weight: normal;
      display: inline-block;
      vertical-align: middle;
      line-height: 1;
      text-transform: none;
      letter-spacing: normal;
      word-wrap: normal;
      white-space: nowrap;
      direction: ltr;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      -moz-osx-font-smoothing: grayscale;
    }

    :root {
      --color-primary: #3A606E;
      --color-secondary: #607B7D;
      --color-muted: #828E82;
      --color-bg-card: #E0E0E0;
      --color-bg-body: #1E2E35;
      
      --font-main: 'Elms Sans', 'Commissioner', 'Montserrat', 'SN Pro', sans-serif;
      --font-alt: 'Google Sans Flex', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--color-bg-body);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      font-family: var(--font-main);
    }

    .app-wrapper {
      width: 100%;
      max-width: 430px;
    }

    .device-container {
      background-color: var(--color-bg-card);
      width: 100%;
      height: 860px;
      max-height: 95vh;
      border-radius: 40px;
      border: 6px solid #C5CBC5;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 40px 30px;
      text-align: center;
    }

    /* Global Dark Mode styling compatibility */
    .device-container.dark-mode {
      background-color: #1F2023;
      border-color: #2D3035;
    }

    .error-code {
      font-size: 96px;
      font-weight: 800;
      color: var(--color-primary);
      margin-bottom: 10px;
      font-family: var(--font-alt);
      letter-spacing: -2px;
    }

    .error-title {
      font-size: 22px;
      font-weight: 700;
      color: #2F3E3F;
      margin-bottom: 15px;
    }
    .device-container.dark-mode .error-title {
      color: #E8EAED;
    }

    .error-desc {
      font-size: 14px;
      color: var(--color-secondary);
      line-height: 1.6;
      margin-bottom: 35px;
    }
    .device-container.dark-mode .error-desc {
      color: #9AA0A6;
    }

    .back-btn {
      background-color: var(--color-primary);
      color: #FFFFFF;
      border: none;
      padding: 14px 28px;
      border-radius: 25px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 12px rgba(58, 96, 110, 0.3);
      transition: all 0.2s ease;
    }

    .back-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(58, 96, 110, 0.4);
    }

    .back-btn:active {
      transform: translateY(0);
    }

    @media (max-width: 480px) {
      body {
        padding: 0;
      }
      .device-container {
        border-radius: 0;
        border: none;
        box-shadow: none;
        height: 100vh;
        max-height: 100vh;
      }
    }
  </style>
</head>
<body>

  <main class="app-wrapper">
    <div class="device-container" id="deviceContainer">
      <span class="material-symbols-outlined" style="font-size: 72px; color: var(--color-primary); margin-bottom: 20px;">dangerous</span>
      <h1 class="error-code">404</h1>
      <h2 class="error-title">Page Not Found</h2>
      <p class="error-desc">
        The feature or page you are trying to access is currently offline or undergoing maintenance. Please check back in future updates!
      </p>
      <button class="back-btn" onclick="goBack()">
        <span class="material-symbols-outlined" style="font-size: 18px;">arrow_back</span>
        <span>Go Back</span>
      </button>
    </div>
  </main>

  <script>
    function goBack() {
      // Return to referrer or home
      if (document.referrer) {
        window.location.href = document.referrer;
      } else {
        window.location.href = '/home/home.html';
      }
    }

    // Apply global theme
    const isDarkMode = localStorage.getItem('calseva_dark_mode') === 'true';
    if (isDarkMode) {
      document.getElementById('deviceContainer').classList.add('dark-mode');
    }
  </script>
</body>
</html>
