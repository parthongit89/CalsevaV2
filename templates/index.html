<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/waking-monitor.js"></script>
  <script src="/theme-loader.js"></script>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=./cal-login/cal-login.html">
  <title>Redirecting to CalSEVA...</title>
  <script>
    window.location.href = "./cal-login/cal-login.html";
  </script>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#3A606E">
</head>
<body>
  <p>Redirecting to <a href="./cal-login/cal-login.html">CalSEVA Login</a>...</p>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('Service Worker registered successfully:', reg.scope))
          .catch(err => console.log('Service Worker registration failed:', err));
      });
    }
  </script>
</body>
</html>
